<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meridian | Contact Us</title>
    
    <meta name="description" content="Get in touch with the Meridian team for support or inquiries.">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/contact.css">

    <script src="https://code.jquery.com/jquery-3.7.1.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js" defer></script>
    <script src="js/main.js" defer></script>
    <script src="js/contact.js" defer></script>
</head>
<body class="d-flex flex-column min-vh-100">

    <div id="header-placeholder"></div>

    <main class="container py-5 flex-grow-1">
        <div class="row g-5 align-items-center">
            
            <div class="col-lg-5">
                <h1 class="display-5 fw-bold mb-4">Let's <span class="text-primary">Connect.</span></h1>
                <p class="text-muted mb-5 lead">
                    Have questions about our architecture or want to suggest a feature? Reach out and we'll get back to you as soon as possible.
                </p>

                <div class="d-flex align-items-center mb-4">
                    <div class="icon-box bg-primary-subtle text-primary rounded-circle p-3 me-3">
                        <i class="bi bi-envelope-at fs-4"></i>
                    </div>
                    <div>
                        <h5 class="mb-0 fw-bold">Email Us</h5>
                        <p class="text-muted mb-0">support@meridiantasks.com</p>
                    </div>
                </div>

                <div class="d-flex align-items-center mb-4">
                    <div class="icon-box bg-success-subtle text-success rounded-circle p-3 me-3">
                        <i class="bi bi-geo-alt fs-4"></i>
                    </div>
                    <div>
                        <h5 class="mb-0 fw-bold">Location</h5>
                        <p class="text-muted mb-0">University Capstone Lab, Athens</p>
                    </div>
                </div>
            </div>

            <div class="col-lg-7">
                <div class="card border-0 shadow-lg rounded-4 p-4 p-md-5">
                    <form id="contact-form">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label small text-muted fw-bold">Full Name</label>
                                <input type="text" id="contact-name" class="form-control" placeholder="Aristeidis Vamvakas" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label small text-muted fw-bold">Email Address</label>
                                <input type="email" id="contact-email" class="form-control" placeholder="name@example.com" required>
                            </div>
                            <div class="col-12">
                                <label class="form-label small text-muted fw-bold">Subject</label>
                                <select id="contact-subject" class="form-select">
                                    <option selected>General Inquiry</option>
                                    <option>Technical Support</option>
                                    <option>Feature Suggestion</option>
                                </select>
                            </div>
                            <div class="col-12">
                                <label class="form-label small text-muted fw-bold">Message</label>
                                <textarea id="contact-message" class="form-control" rows="5" placeholder="How can we help?" required></textarea>
                            </div>
                            <div class="col-12">
                                <button type="submit" class="btn btn-primary w-100 rounded-pill py-3 fw-bold mt-2 shadow-sm">
                                    Send Message <i class="bi bi-send-fill ms-2"></i>
                                </button>
                            </div>
                        </div>
                    </form>
                    
                    <div id="contact-success" class="alert alert-success d-none mt-4 rounded-4 border-0 shadow-sm" role="alert">
                        <div class="d-flex align-items-center">
                            <i class="bi bi-check-circle-fill fs-4 me-3"></i>
                            <div>
                                <h6 class="mb-0 fw-bold">Message Sent!</h6>
                                <p class="mb-0 small">Thank you for reaching out. We've logged your inquiry.</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

</body>
</html>
