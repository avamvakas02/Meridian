<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meridian | Home</title>
    
    <meta name="description" content="Meridian: Professional Task Management for high-performance teams.">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/home.css">

    <script src="https://code.jquery.com/jquery-3.7.1.min.js" defer></script>
    <script src="js/main.js" defer></script>
    <script src="js/api.js" defer></script>
</head>
<body class="d-flex flex-column min-vh-100">

    <div id="header-placeholder"></div>

    <main id="home-content">
        <section class="hero-section py-5 bg-light">
            <div class="container text-center">
                <h1 class="display-4 fw-bold">Master Your Workflow with <span class="text-primary">Meridian</span></h1>
                <p class="lead text-muted mb-4">The all-in-one task management solution designed for professional excellence and peak productivity.</p>
                <a href="tasks.html" class="btn btn-primary btn-lg px-5 rounded-pill shadow">Go to Tasks</a>
            </div>
        </section>

        <section class="activity-section py-5">
            <div class="container">
                <div class="row align-items-center">
                    <div class="col-md-6">
                        <h2 class="h3 mb-4">Latest Activity</h2>
                        <ul id="activity-list" class="list-group list-group-flush shadow-sm rounded">
                            <li class="list-group-item text-muted">No recent activity detected.</li>
                        </ul>
                    </div>
                    <div class="col-md-6">
                        <div id="api-quote-container" class="p-4 border rounded shadow-sm bg-white border-primary">
                            <h4 class="h5 text-primary">Daily Inspiration</h4>
                            <blockquote class="blockquote mb-0">
                                <p id="quote-text" class="small">Loading your daily insight...</p>
                                <footer id="quote-author" class="blockquote-footer mt-1">Meridian Systems</footer>
                            </blockquote>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <div id="footer-placeholder"></div>

</body>
</html>
